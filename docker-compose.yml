# variables are set in the .env file

services:
  traefik:
    image: "traefik:v3.7.7"
    # Get environment variables from .env file to pass to Traefik
    env_file: .env.traefik

    # This allows the container to resolve 'host.docker.internal'
    # to the host machine's IP address (10.0.1.1 in this case).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik.yml:/traefik.yml:ro"
      - "./acme.json:/acme.json"
      - "traefik-logs:/var/log/traefik"
      - "./traefik-dynamic:/etc/traefik-dynamic:ro"
    networks:
      - traefik-net
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 200M
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

        # --- Router for the Dashboard ---
        - "traefik.http.routers.dashboard.rule=Host(`traefik.trelvik.net`)"
        - "traefik.http.routers.dashboard.entrypoints=https"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.tls=true"
        - "traefik.http.routers.dashboard.tls.certresolver=myresolver"

        # --- SSO Middleware ---
        - "traefik.http.routers.dashboard.middlewares=sso-auth@swarm"
        - "traefik.http.middlewares.sso-auth.forwardauth.address=http://traefik-forward-auth:4181"
        - "traefik.http.middlewares.sso-auth.forwardauth.authResponseHeaders=X-Forwarded-User"
        - "traefik.http.middlewares.sso-auth.forwardauth.trustForwardHeader=true"
        - "traefik.http.middlewares.sso-auth.forwardauth.maxResponseBodySize=8192"
        - "traefik.http.middlewares.sso-auth.forwardauth.addAuthCookiesToResponse=_forward_auth,_forward_auth_csrf"

        # --- Observability Middleware (IP AllowList) ---
        - "traefik.http.middlewares.observability-only.ipallowlist.sourcerange=10.0.4.0/24"

  traefik-forward-auth:
    image: "thomseddon/traefik-forward-auth:2"
    # Get environment variables from .env file to pass to Traefik Forward Auth
    env_file: .env.traefik-forward-auth
    networks:
      - traefik-net
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 24M
      labels:
        - "traefik.enable=true"
        # Router for all auth traffic (including /_oauth callback)
        - "traefik.http.routers.forward-auth.rule=Host(`auth.trelvik.net`)"
        - "traefik.http.routers.forward-auth.entrypoints=https"
        - "traefik.http.routers.forward-auth.tls=true"
        - "traefik.http.routers.forward-auth.tls.certresolver=myresolver"

        # Map to the forward-auth container on port 4181
        - "traefik.http.services.forward-auth.loadbalancer.server.port=4181"

networks:
  traefik-net:
    # Create the network externally first using:
    # `docker network create --driver=overlay traefik-net`
    external: true

volumes:
  traefik-logs:
    name: traefik-logs